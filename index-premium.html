<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ahmad Premium</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
    min-height:100vh;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.hero{
    text-align:center;
}

.hero h1{
    color:#e91e63;
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    color:#666;
    font-size:18px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:12px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#e91e63;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery-item{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.gallery-item img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.gallery-content{
    padding:15px;
}
</style>

</head>

<body>

<div class="container">

<div class="card hero">

<h1>🎂 Happy Birthday Ahmad 🎂</h1>

<p>
Long life with health, wealth and peace.
</p>

</div>

<div class="card">

<h2>Guest Registration</h2>

<input type="text" id="name" placeholder="Your Name">

<textarea id="wish"
placeholder="Write your birthday wishes..."></textarea>

<input type="file" id="photo" accept="image/*">

<button id="submitBtn">
Submit Wishes
</button>

<p id="status"></p>

</div>

<div class="card">

<h2>Birthday Guest Gallery</h2>

<div class="gallery" id="gallery">

<p>Loading guest gallery...</p>

</div>

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
  getDatabase,
  ref,
  push,
  onValue
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBookcYSBkihpgzFLDlrgzHlVkVvY4UbSg",
  authDomain: "bonappe-online-order.firebaseapp.com",
  databaseURL: "https://bonappe-online-order-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bonappe-online-order",
  storageBucket: "bonappe-online-order.firebasestorage.app",
  messagingSenderId: "555729028075",
  appId: "1:555729028075:web:39cac776f80fdd727e0fae",
  measurementId: "G-30WE6T926B"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
  const wishesRef = ref(db, "birthday-ahmad/wishes");

document.getElementById("submitBtn")
.addEventListener("click", async ()=>{

    const name =
        document.getElementById("name").value;

    const wish =
        document.getElementById("wish").value;

    if(name.trim()==="" || wish.trim()===""){

        alert("Please enter your name and wishes.");

        return;
    }

    await push(wishesRef, {

        name:name,
        wish:wish,
        date:new Date().toLocaleString()

    });

    document.getElementById("status").innerText =
        "🎉 Wishes submitted successfully!";

    document.getElementById("name").value="";
    document.getElementById("wish").value="";
});
  onValue(wishesRef, (snapshot)=>{

    const gallery =
        document.getElementById("gallery");

    gallery.innerHTML = "";

    snapshot.forEach((child)=>{

        const guest = child.val();

        gallery.innerHTML += `
            <div class="gallery-item">

                <h3>${guest.name}</h3>

                <p>${guest.wish}</p>

                <small>${guest.date}</small>

            </div>
        `;
    });

});

console.log("Firebase Connected");

</script>

</body>
</html>
